<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Toma de Medidas Flekk</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Toma de Medidas Flekk</h1>
            <p>Escanea el código de barras y registra las medidas</p>
        </div>

        <div class="scanner-card">
            <div class="input-group">
                <input type="text" id="skuInput" placeholder="Escanea o ingresa el SKU" autofocus>
                <button id="scanCameraBtn" class="btn-camera">📷 Escanear</button>
            </div>
            <button id="scanBtn">🔍 Verificar</button>
            <div id="status"></div>
        </div>

        <!-- Visor de cámara -->
        <div id="cameraContainer" class="camera-container" style="display:none;">
            <div class="camera-card">
                <video id="scanner-video" playsinline style="width: 100%; border-radius: 16px; background: #000;"></video>
                <div class="camera-controls">
                    <button id="closeCameraBtn">❌ Cancelar</button>
                </div>
                <p class="camera-hint">🎯 Apunta al código de barras</p>
            </div>
        </div>

        <!-- Formulario de medidas -->
        <div id="formContainer" style="display:none;">
            <div class="form-card">
                <h3>📏 Registrar Medidas</h3>
                
                <div class="product-info">
                    <label>📋 SKU:</label>
                    <span id="displaySku" class="sku-highlight"></span>
                </div>
                
                <div class="product-info">
                    <label>📦 Artículo:</label>
                    <span id="displayArticulo" class="articulo-highlight"></span>
                </div>
                
                <div class="dimensions">
                    <input type="number" id="alto" placeholder="Alto (cm)" step="0.01">
                    <input type="number" id="ancho" placeholder="Ancho (cm)" step="0.01">
                    <input type="number" id="largo" placeholder="Largo (cm)" step="0.01">
                </div>
                
                <div class="packaging">
                    <button class="packBtn" data-pack="caja">📦 Caja</button>
                    <button class="packBtn" data-pack="bolsa">🛍️ Bolsa</button>
                    <button class="packBtn" data-pack="ninguno">📦 Sin empaque</button>
                </div>
                
                <div class="form-actions">
                    <button id="saveBtn">💾 Guardar Medidas</button>
                    <button id="cancelBtn">❌ Cancelar</button>
                </div>
            </div>
        </div>

        <!-- Modal de alerta -->
        <div id="alertModal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3>⚠️ Producto ya registrado</h3>
                <div id="alertDetails"></div>
            </div>
        </div>
    </div>

    <!-- Librería Instascan desde CDN confiable -->
    <script src="https://cdn.jsdelivr.net/npm/instascan@1.0.0/instascan.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
