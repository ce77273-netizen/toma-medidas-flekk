version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flekk-postgres
    environment:
      POSTGRES_USER: flekk_user
      POSTGRES_PASSWORD: flekk_pass_2024
      POSTGRES_DB: toma_medidas_flekk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - flekk-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: flekk-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: flekk_user
      DB_PASSWORD: flekk_pass_2024
      DB_NAME: toma_medidas_flekk
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - flekk-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  flekk-network:
    driver: bridge